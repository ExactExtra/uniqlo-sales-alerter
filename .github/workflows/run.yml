name: Run Uniqlo Alert

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: |
          cd src
          python -m uniqlo_sales_alerter
        env:
          EMAIL_ENABLED: "true"
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USE_TLS: "true"
          
          SMTP_USER: ${{ secrets.EMAIL_USER }}
          SMTP_PASSWORD: ${{ secrets.EMAIL_PASS }}
          SMTP_FROM: ${{ secrets.EMAIL_USER }}
          SMTP_TO: ${{ secrets.TO_EMAIL }}
